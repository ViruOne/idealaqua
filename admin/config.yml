backend:
  name: github
  repo: KarimjonAsliddinov/repo-nomi # GitHub foydalanuvchi nomingiz va repozitoriya nomini yozing
  branch: main # Agar asosiy branch master bo'lsa, master deb yozing
  base_url: https://api.netlify.com # Vaqtincha avtorizatsiya serveri sifatida Netlify-dan foydalanamiz

media_folder: "images/uploads" # Rasmlar saqlanadigan papka
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Mahsulotlar"
    folder: "data/products" # Mahsulotlar fayllari saqlanadigan joy
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Mahsulot Nomi", name: "title", widget: "string" }
      - { label: "Narxi (so'm)", name: "price", widget: "number", value_type: "int" }
      - { label: "Rasm", name: "image", widget: "image" }
      - { label: "Batafsil ma'lumot", name: "body", widget: "markdown", required: false }
