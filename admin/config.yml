backend:
  name: github
  repo: ViruOne/idealaqua
  branch: main
  base_url: https://api.netlify.com
  site_domain: relaxed-bienenstitch-7df677.netlify.app

# Oldindan ko'rish oynasidagi React xatoligini oldini olish:
editor:
  preview: false

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Mahsulotlar"
    folder: "data/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Mahsulot Nomi", name: "title", widget: "string" }
      - { label: "Narxi (so'm)", name: "price", widget: "number", value_type: "int" }
      - { label: "Rasm", name: "image", widget: "image" }
      - { label: "Batafsil ma'lumot", name: "body", widget: "markdown", required: false }
