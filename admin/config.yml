backend:
  name: github
  repo: ViruOne/idealaqua
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products_list"
    label: "Mahsulotlar Boshqaruvi"
    files:
      - file: "public/products.json"
        name: "products"
        label: "Barcha Mahsulotlar"
        fields:
          - name: "items"
            label: "Mahsulotlar Ro'yxati"
            widget: "list"
            fields:
              - { label: "ID / Kod", name: "id", widget: "string", required: false }
              - { label: "Nomi", name: "title", widget: "string" }
              - { label: "Kategoriya", name: "category", widget: "string" }
              - { label: "Narxi (so'm)", name: "price", widget: "number", value_type: "int" }
              - { label: "Rasm", name: "image", widget: "image", required: false }
              - { label: "Tavsif", name: "body", widget: "text", required: false }
