backend:
  name: github
  repo: GITHUB_USERNAME/REPO_NOMI # Masalan: ideal-aqua/website
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "products"
    label: "Mahsulotlar"
    folder: "data/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nomi", name: "title", widget: "string" }
      - { label: "Kategoriya", name: "category", widget: "string", default: "Fitinglar" }
      - { label: "Narxi (so'mda)", name: "price", widget: "number", value_type: "int" }
      - { label: "Rasm", name: "image", widget: "image", required: false }
      - { label: "Batafsil ma'lumot", name: "body", widget: "text", required: false }
