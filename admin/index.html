<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <!-- Netlify Identity vidjetini yuklash -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- Decap CMS skriptini yuklash -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      // CMS yuklanishidan oldin subdomendagi Identity manzilini global xotiraga majburiy yozamiz
      window.netlifyIdentity = window.netlifyIdentity || {};
      localStorage.setItem('netlifySiteURL', 'https://shop.idealaqua.uz');

      // Login muvaffaqiyatli bo'lsa, sahifani yangilash
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
