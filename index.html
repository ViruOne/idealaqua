<!DOCTYPE html>
<html lang="uz" class="h-full bg-slate-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEAL AQUA — Katalog</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💧</text></svg>">
    
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Space Grotesk', 'sans-serif'] },
                    colors: {
                        aqua: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full bg-slate-900 text-slate-100 flex flex-col antialiased selection:bg-aqua-500 selection:text-white pb-16 md:pb-0">

    <!-- Navbar -->
    <header class="bg-slate-950/80 backdrop-blur-xl border-b border-slate-800 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-aqua-600 to-cyan-400 flex items-center justify-center text-white shadow-lg shadow-aqua-500/20">
                    <i class="fas fa-droplet text-lg"></i>
                </div>
                <div>
                    <span class="text-lg font-bold tracking-wider text-white">IDEAL AQUA</span>
                    <span class="block text-[10px] text-aqua-400 font-semibold uppercase tracking-widest">Industrial LLC</span>
                </div>
            </div>

            <!-- Search (Desktop) -->
            <div class="flex-1 max-w-md relative hidden sm:block">
                <i class="fas fa-search absolute left-3.5 top-3 text-slate-500 text-sm"></i>
                <input type="text" id="search-input" oninput="filterProducts()" placeholder="Mahsulot qidirish..." 
                       class="w-full pl-10 pr-4 py-2 bg-slate-900 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-aqua-500 text-slate-200 placeholder-slate-500 transition">
            </div>

            <!-- Cart Trigger (Desktop) -->
            <button onclick="toggleCart(true)" class="relative bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-200 px-4 py-2 rounded-xl text-sm font-semibold hidden sm:flex items-center gap-2 transition">
                <i class="fas fa-cart-flatbed text-aqua-400"></i>
                <span>Savatcha</span>
                <span id="cart-badge" class="bg-aqua-500 text-slate-950 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
            </button>
        </div>
    </header>

    <!-- Mobil uchun Qidiruv Paneli -->
    <div class="sm:hidden px-4 pt-4">
        <div class="relative w-full">
            <i class="fas fa-search absolute left-3.5 top-3 text-slate-500 text-sm"></i>
            <input type="text" id="search-input-mobile" oninput="syncMobileSearch(this.value)" placeholder="Mahsulot qidirish..." 
                   class="w-full pl-10 pr-4 py-2 bg-slate-950 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-aqua-500 text-slate-200 placeholder-slate-500">
        </div>
    </div>

    <!-- Main Layout -->
    <div class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col md:flex-row gap-6">
        
        <!-- Sidebar (Kategoriyalar) -->
        <aside class="w-full md:w-64 space-y-6 flex-shrink-0">
            <div class="bg-slate-950 p-5 rounded-2xl border border-slate-800/80 space-y-4">
                <div class="flex items-center justify-between">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">Kategoriyalar</h3>
                    <i class="fas fa-layer-group text-slate-500 text-xs"></i>
                </div>
                <nav id="categories-list" class="space-y-1 text-sm">
                    <button onclick="selectCategory('all')" id="cat-btn-all" class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl bg-aqua-500/10 text-aqua-400 font-semibold transition">
                        <span><i class="fas fa-border-all mr-2 opacity-70"></i> Barchasi</span>
                        <span id="count-all" class="text-xs px-2 py-0.5 rounded-full bg-slate-900 border border-slate-800 text-slate-400">0</span>
                    </button>
                </nav>
            </div>
        </aside>

        <!-- Product Grid -->
        <main class="flex-1">
            <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                <div class="bg-slate-950 border border-slate-800 p-4 rounded-2xl animate-pulse h-64"></div>
            </div>
        </main>
    </div>

    <!-- MOBIL BOTTOM NAVIGATION BAR -->
    <div class="md:hidden fixed bottom-0 left-0 right-0 z-40 bg-slate-950/90 backdrop-blur-lg border-t border-slate-800 px-6 py-2">
        <div class="flex items-center justify-around">
            <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="flex flex-col items-center gap-1 text-aqua-400">
                <i class="fas fa-store text-lg"></i>
                <span class="text-[10px] font-semibold">Do'kon</span>
            </button>

            <button onclick="focusMobileSearch()" class="flex flex-col items-center gap-1 text-slate-400 hover:text-white transition">
                <i class="fas fa-search text-lg"></i>
                <span class="text-[10px] font-semibold">Qidiruv</span>
            </button>

            <button onclick="toggleCart(true)" class="relative flex flex-col items-center gap-1 text-slate-400 hover:text-white transition">
                <div class="relative">
                    <i class="fas fa-shopping-bag text-lg"></i>
                    <span id="cart-badge-mobile" class="absolute -top-1.5 -right-2.5 bg-aqua-500 text-slate-950 text-[9px] font-extrabold w-4 h-4 rounded-full flex items-center justify-center">0</span>
                </div>
                <span class="text-[10px] font-semibold">Savat</span>
            </button>
        </div>
    </div>

    <!-- Cart Drawer -->
    <div id="cart-drawer" class="fixed inset-0 z-50 pointer-events-none opacity-0 transition duration-300">
        <div onclick="toggleCart(false)" class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm"></div>
        <div id="cart-panel" class="fixed inset-y-0 right-0 w-full max-w-md bg-slate-950 border-l border-slate-800 p-6 flex flex-col justify-between transform translate-x-full transition duration-300 pointer-events-auto">
            <div>
                <div class="flex items-center justify-between border-b border-slate-800 pb-4 mb-4">
                    <h3 class="font-bold text-lg text-white">Savatcha</h3>
                    <button onclick="toggleCart(false)" class="text-slate-400 hover:text-white"><i class="fas fa-times text-lg"></i></button>
                </div>
                <div id="cart-items" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
            </div>

            <div class="border-t border-slate-800 pt-4 space-y-3">
                <div class="flex justify-between font-bold text-white mb-2">
                    <span>Jami:</span>
                    <span id="cart-total" class="text-aqua-400">0 so'm</span>
                </div>
                <input type="text" id="cust-name" placeholder="Ismingiz" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-aqua-500 text-white">
                <input type="tel" id="cust-phone" placeholder="Telefon raqamingiz" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-aqua-500 text-white">
                
                <button id="checkout-btn" onclick="checkout()" class="w-full bg-aqua-500 hover:bg-aqua-600 text-slate-950 font-bold py-3.5 rounded-xl transition flex items-center justify-center gap-2">
                    <i class="fas fa-check-circle"></i> Buyurtmani Tasdiqlash
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Notification -->
    <div id="success-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md hidden">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-sm w-full text-center space-y-4 shadow-2xl">
            <div class="w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center mx-auto text-2xl border border-emerald-500/20">
                <i class="fas fa-check"></i>
            </div>
            <h3 class="text-xl font-bold text-white">Buyurtmangiz Qabul Qilindi!</h3>
            <p class="text-xs text-slate-400 leading-relaxed">
                Menejerimiz tez orada ko'rsatilgan telefon raqami orqali siz bilan bog'lanadi.
            </p>
            <button onclick="closeSuccessModal()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-2.5 rounded-xl text-sm transition">
                Tushundim
            </button>
        </div>
    </div>

<script>
    const BOT_TOKEN = "8667051988:AAEcPNAYG2rEDp6IKyomGkVxE2Wmr8jeuok"; 
    const CHAT_ID = "7782825299";     

    let allProducts = [];
    let cart = [];
    let currentCategory = 'all';

    async function loadProducts() {
        try {
            const t = new Date().getTime();
            let loadedItems = [];

            // 1. Sveltia CMS indeks faylini o'qiymiz
            const indexRes = await fetch(`/data/products.json?v=${t}`);
            
            if (indexRes.ok) {
                const contentType = indexRes.headers.get("content-type");
                if (contentType && contentType.includes("application/json")) {
                    const fileList = await indexRes.json();
                    
                    if (Array.isArray(fileList)) {
                        const fetchPromises = fileList.map(async (fileName) => {
                            try {
                                const pRes = await fetch(`/data/products/${fileName}?v=${t}`);
                                if (pRes.ok) return await pRes.json();
                            } catch (err) {
                                return null;
                            }
                        });

                        const fetched = await Promise.all(fetchPromises);
                        loadedItems = fetched.filter(p => p && typeof p === 'object');
                    }
                }
            }

            // 2. Maydonlarni to'g'ri biriktirish (title birinchi o'rinda)
            allProducts = loadedItems.map((p, index) => ({
                id: p.id || `prod_${index}`,
                title: p.title || p.name || p.nomi || "Nomsiz mahsulot",
                category: p.category || p.kategoriya || "Barchasi",
                price: Number(p.price || p.narxi) || 0,
                image: p.image || "",
                body: p.body || p.description || p.tavsif || ""
            }));

            renderCategories();
            filterProducts();

        } catch (e) {
            console.error("Yuklash xatosi:", e);
            renderCategories();
            renderEmpty("Mahsulotlarni yuklashda xatolik yuz berdi.");
        }
    }

    function syncMobileSearch(val) {
        const desktopInput = document.getElementById('search-input');
        if (desktopInput) {
            desktopInput.value = val;
            filterProducts();
        }
    }

    function focusMobileSearch() {
        const mobileInput = document.getElementById('search-input-mobile');
        if (mobileInput) {
            mobileInput.focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    // CMS'DAN KELGAN KATEGORIYALARNI CHIQARISH
    function renderCategories() {
        const catNav = document.getElementById('categories-list');
        if (!catNav) return;

        const counts = {};
        
        allProducts.forEach(p => {
            let cat = p.category || 'Boshqa';
            if (typeof cat === 'string') cat = cat.trim();
            if (!cat) cat = 'Boshqa';

            counts[cat] = (counts[cat] || 0) + 1;
        });

        // "Barchasi" tugmasi
        let html = `
            <button onclick="selectCategory('all')" 
                    class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl transition text-left ${currentCategory === 'all' ? 'bg-aqua-500/10 text-aqua-400 font-semibold' : 'text-slate-400 hover:text-white hover:bg-slate-900'}">
                <span><i class="fas fa-border-all mr-2 opacity-70"></i> Barchasi</span>
                <span class="text-xs px-2 py-0.5 rounded-full bg-slate-900 border border-slate-800 text-slate-400">${allProducts.length}</span>
            </button>
        `;

        // Har bir kategoriya uchun tugma
        Object.keys(counts).forEach(cat => {
            const isActive = currentCategory === cat;
            const activeClasses = isActive 
                ? 'bg-aqua-500/10 text-aqua-400 font-semibold' 
                : 'text-slate-400 hover:text-white hover:bg-slate-900';
            
            const safeCat = cat.replace(/'/g, "\\'");
            html += `
                <button onclick="selectCategory('${safeCat}')" 
                        class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl transition text-left ${activeClasses}">
                    <span class="truncate"><i class="fas fa-folder mr-2 opacity-70"></i> ${cat}</span>
                    <span class="text-xs px-2 py-0.5 rounded-full bg-slate-900 border border-slate-800 text-slate-400">${counts[cat]}</span>
                </button>
            `;
        });

        catNav.innerHTML = html;
    }

    function selectCategory(cat) {
        currentCategory = cat;
        renderCategories(); 
        filterProducts();   
    }

    function filterProducts() {
        const desktopInput = document.getElementById('search-input');
        const q = (desktopInput ? desktopInput.value : '').toLowerCase().trim();

        const filtered = allProducts.filter(p => {
            const pCategory = (p.category || 'Boshqa').trim();
            const pTitle = p.title || '';
            const pBody = p.body || '';

            const matchCategory = (currentCategory === 'all') || (pCategory === currentCategory);
            const matchSearch = pTitle.toLowerCase().includes(q) || pBody.toLowerCase().includes(q);
            
            return matchCategory && matchSearch;
        });

        renderProducts(filtered);
    }

    function renderProducts(products) {
        const grid = document.getElementById('products-grid');
        if (!grid) return;

        if (!products || products.length === 0) {
            return renderEmpty("Ushbu kategoriyada mahsulotlar topilmadi.");
        }

        grid.innerHTML = '';
        products.forEach((p) => {
            const title = p.title || 'Nomsiz Mahsulot';
            const body = p.body || '';
            const price = Number(p.price) || 0;
            const category = p.category || 'Boshqa';
            
            const realIndex = allProducts.findIndex(item => item.title === title);

            const img = p.image 
                ? `<img src="${p.image}" class="h-48 w-full object-cover group-hover:scale-105 transition duration-500" alt="${title}">`
                : `<div class="h-48 w-full bg-slate-900 flex items-center justify-center text-slate-700 group-hover:text-aqua-500 transition duration-300"><i class="fas fa-box text-5xl"></i></div>`;

            grid.innerHTML += `
                <div class="bg-slate-950 border border-slate-800/80 hover:border-aqua-500/40 rounded-2xl flex flex-col justify-between overflow-hidden transition duration-300 hover:-translate-y-1 hover:shadow-xl hover:shadow-aqua-500/5 group">
                    <div class="relative">
                        <div class="overflow-hidden bg-slate-900">
                            ${img}
                        </div>
                        <div class="absolute top-3 left-3 flex flex-col gap-1 z-10">
                            <span class="bg-slate-900/80 border border-slate-700 text-aqua-400 text-[10px] font-bold px-2 py-0.5 rounded-md backdrop-blur-md">
                                ${category}
                            </span>
                        </div>
                    </div>

                    <div class="p-4 flex-1 flex flex-col justify-between space-y-3">
                        <div>
                            <h4 class="font-bold text-slate-100 group-hover:text-aqua-400 transition-colors duration-200 text-sm line-clamp-2 leading-snug">
                                ${title}
                            </h4>
                            <p class="text-xs text-slate-400 line-clamp-2 mt-1.5 font-normal leading-relaxed">
                                ${body || 'Ushbu mahsulot uchun tavsif kiritilmagan.'}
                            </p>
                        </div>

                        <div class="flex items-center justify-between border-t border-slate-900/80 pt-3 mt-auto">
                            <div class="flex flex-col">
                                <span class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">Narxi</span>
                                <span class="font-extrabold text-aqua-400 text-base tracking-tight">
                                    ${price.toLocaleString()} <span class="text-xs font-normal text-slate-400">so'm</span>
                                </span>
                            </div>
                            <button onclick="addToCart(${realIndex >= 0 ? realIndex : 0})" 
                                    title="Savatga qo'shish"
                                    class="bg-slate-900 hover:bg-aqua-500 hover:text-slate-950 border border-slate-800 hover:border-aqua-400 text-slate-200 px-3 py-2 rounded-xl text-xs font-bold transition duration-200 flex items-center gap-2 group/btn active:scale-95">
                                <i class="fas fa-cart-plus text-sm group-hover/btn:scale-110 transition"></i>
                                <span class="hidden sm:inline">Qo'shish</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function renderEmpty(msg) {
        const grid = document.getElementById('products-grid');
        if (grid) {
            grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500">${msg}</div>`;
        }
    }

    function addToCart(index) {
        const product = allProducts[index];
        if (!product) return;

        const title = product.title || 'Nomsiz';
        const price = Number(product.price) || 0;

        const existing = cart.find(c => c.title === title);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({ title, price, qty: 1 });
        }
        updateCartUI();
        toggleCart(true);
    }

    function updateCartUI() {
        const badge = document.getElementById('cart-badge');
        const badgeMobile = document.getElementById('cart-badge-mobile');
        const totalElem = document.getElementById('cart-total');
        const list = document.getElementById('cart-items');

        const totalQty = cart.reduce((s, i) => s + i.qty, 0);
        const totalPrice = cart.reduce((s, i) => s + (i.price * i.qty), 0);

        if (badge) badge.textContent = totalQty;
        if (badgeMobile) badgeMobile.textContent = totalQty;
        if (totalElem) totalElem.textContent = `${totalPrice.toLocaleString()} so'm`;

        if (list) {
            if (cart.length === 0) {
                list.innerHTML = `<p class="text-xs text-slate-500 text-center py-4">Savatcha bo'sh</p>`;
            } else {
                list.innerHTML = cart.map((item, idx) => `
                    <div class="flex justify-between items-center p-3 bg-slate-900 rounded-xl border border-slate-800 text-xs">
                        <div>
                            <p class="font-bold text-white">${item.title}</p>
                            <p class="text-slate-500">${item.price.toLocaleString()} so'm</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="changeQty(${idx}, -1)" class="text-slate-400 hover:text-white px-2 py-0.5 bg-slate-800 rounded">-</button>
                            <span class="font-bold">${item.qty}</span>
                            <button onclick="changeQty(${idx}, 1)" class="text-slate-400 hover:text-white px-2 py-0.5 bg-slate-800 rounded">+</button>
                        </div>
                    </div>
                `).join('');
            }
        }
    }

    function changeQty(idx, delta) {
        if (!cart[idx]) return;
        cart[idx].qty += delta;
        if (cart[idx].qty <= 0) cart.splice(idx, 1);
        updateCartUI();
    }

    function toggleCart(open) {
        const drawer = document.getElementById('cart-drawer');
        const panel = document.getElementById('cart-panel');
        if (!drawer || !panel) return;

        if (open) {
            drawer.classList.remove('pointer-events-none', 'opacity-0');
            panel.classList.remove('translate-x-full');
        } else {
            drawer.classList.add('opacity-0');
            panel.classList.add('translate-x-full');
            setTimeout(() => drawer.classList.add('pointer-events-none'), 300);
        }
    }

    async function checkout() {
        const nameElem = document.getElementById('cust-name');
        const phoneElem = document.getElementById('cust-phone');
        const btn = document.getElementById('checkout-btn');

        const name = nameElem ? nameElem.value.trim() : '';
        const phone = phoneElem ? phoneElem.value.trim() : '';

        if (!name || !phone) {
            alert("Iltimos, ismingiz va telefon raqamingizni kiriting!");
            return;
        }

        if (cart.length === 0) {
            alert("Savatchangiz bo'sh!");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Yuborilmoqda...`;

        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        let message = `🛒 *YANGI BUYURTMA (IDEAL AQUA)*\n\n`;
        message += `👤 *Mijoz:* ${name}\n`;
        message += `📞 *Tel:* ${phone}\n\n`;
        message += `📦 *Mahsulotlar:* \n`;

        cart.forEach((item, index) => {
            message += `${index + 1}. ${item.title} — ${item.qty} ta x ${item.price.toLocaleString()} = ${(item.price * item.qty).toLocaleString()} so'm\n`;
        });

        message += `\n💰 *Jami:* ${total.toLocaleString()} so'm`;

        if (BOT_TOKEN === "YOUR_BOT_TOKEN") {
            alert("Telegram Bot Token joylanmagan!");
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-check-circle"></i> Buyurtmani Tasdiqlash`;
            return;
        }

        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });

            if (response.ok) {
                cart = [];
                updateCartUI();
                if (nameElem) nameElem.value = '';
                if (phoneElem) phoneElem.value = '';
                
                toggleCart(false);
                document.getElementById('success-modal').classList.remove('hidden');
            } else {
                alert("Telegram API'da xatolik yuz berdi.");
            }
        } catch (err) {
            alert("Tarmoq xatosi!");
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-check-circle"></i> Buyurtmani Tasdiqlash`;
        }
    }

    function closeSuccessModal() {
        const modal = document.getElementById('success-modal');
        if (modal) modal.classList.add('hidden');
    }

    document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
