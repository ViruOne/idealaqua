<!DOCTYPE html>
<html lang="uz" class="h-full bg-slate-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEAL AQUA — Sanoat & Sug'orish Katalogi</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💧</text></svg>">
    
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Space Grotesk', 'sans-serif'] },
                    colors: {
                        aqua: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full bg-slate-900 text-slate-100 flex flex-col antialiased selection:bg-aqua-500 selection:text-white">

    <!-- Navbar -->
    <header class="bg-slate-950/80 backdrop-blur-xl border-b border-slate-800 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-aqua-600 to-cyan-400 flex items-center justify-center text-white shadow-lg shadow-aqua-500/20">
                    <i class="fas fa-droplet text-lg"></i>
                </div>
                <div>
                    <span class="text-lg font-bold tracking-wider text-white">IDEAL AQUA</span>
                    <span class="block text-[10px] text-aqua-400 font-semibold uppercase tracking-widest">Industrial LLC</span>
                </div>
            </div>

            <!-- Search -->
            <div class="flex-1 max-w-md relative hidden sm:block">
                <i class="fas fa-search absolute left-3.5 top-3 text-slate-500 text-sm"></i>
                <input type="text" id="search-input" oninput="filterProducts()" placeholder="Mahsulot qidirish..." 
                       class="w-full pl-10 pr-4 py-2 bg-slate-900 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-aqua-500 text-slate-200 placeholder-slate-500">
            </div>

            <!-- Cart Trigger -->
            <button onclick="toggleCart(true)" class="relative bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-200 px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 transition">
                <i class="fas fa-cart-flatbed text-aqua-400"></i>
                <span class="hidden sm:inline">Savatcha</span>
                <span id="cart-badge" class="bg-aqua-500 text-slate-950 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
            </button>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col md:flex-row gap-6">
        
        <!-- Sidebar -->
        <aside class="w-full md:w-64 space-y-6 flex-shrink-0">
            <div class="bg-slate-950 p-5 rounded-2xl border border-slate-800/80 space-y-4">
                <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">Kategoriyalar</h3>
                <nav class="space-y-1 text-sm">
                    <button onclick="filterCategory('all')" class="w-full flex items-center justify-between px-3 py-2 rounded-lg bg-aqua-500/10 text-aqua-400 font-medium">
                        <span><i class="fas fa-border-all mr-2 opacity-70"></i> Barchasi</span>
                        <span id="count-all" class="text-xs opacity-60">0</span>
                    </button>
                </nav>
            </div>
        </aside>

        <!-- Product Grid -->
        <main class="flex-1">
            <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="bg-slate-950 border border-slate-800 p-4 rounded-2xl animate-pulse h-64"></div>
            </div>
        </main>
    </div>

    <!-- Cart Drawer -->
    <div id="cart-drawer" class="fixed inset-0 z-50 pointer-events-none opacity-0 transition duration-300">
        <div onclick="toggleCart(false)" class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm"></div>
        <div id="cart-panel" class="fixed inset-y-0 right-0 w-full max-w-md bg-slate-950 border-l border-slate-800 p-6 flex flex-col justify-between transform translate-x-full transition duration-300 pointer-events-auto">
            <div>
                <div class="flex items-center justify-between border-b border-slate-800 pb-4 mb-4">
                    <h3 class="font-bold text-lg text-white">Savatcha</h3>
                    <button onclick="toggleCart(false)" class="text-slate-400 hover:text-white"><i class="fas fa-times text-lg"></i></button>
                </div>
                <div id="cart-items" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
            </div>

            <div class="border-t border-slate-800 pt-4 space-y-3">
                <div class="flex justify-between font-bold text-white mb-2">
                    <span>Jami:</span>
                    <span id="cart-total" class="text-aqua-400">0 so'm</span>
                </div>
                <input type="text" id="cust-name" placeholder="Ismingiz" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-aqua-500 text-white">
                <input type="tel" id="cust-phone" placeholder="Telefon raqamingiz" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-aqua-500 text-white">
                
                <button id="checkout-btn" onclick="checkout()" class="w-full bg-aqua-500 hover:bg-aqua-600 text-slate-950 font-bold py-3.5 rounded-xl transition flex items-center justify-center gap-2">
                    <i class="fas fa-check-circle"></i> Buyurtmani Tasdiqlash
                </button>
            </div>
        </div>
    </div>

    <!-- Muvaffaqiyatli Yuborilganlik Haqida Modal Oyna -->
    <div id="success-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md hidden">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-sm w-full text-center space-y-4 shadow-2xl">
            <div class="w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center mx-auto text-2xl border border-emerald-500/20">
                <i class="fas fa-check"></i>
            </div>
            <h3 class="text-xl font-bold text-white">Buyurtmangiz Qabul Qilindi!</h3>
            <p class="text-xs text-slate-400 leading-relaxed">
                Menejerimiz tez orada ko'rsatilgan telefon raqami orqali siz bilan bog'lanadi.
            </p>
            <button onclick="closeSuccessModal()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-2.5 rounded-xl text-sm transition">
                Tushundim
            </button>
        </div>
    </div>

    <script>
        // Telegram Bot Konfiguratsiyasi
        const BOT_TOKEN = "YOUR_BOT_TOKEN"; // Botingiz tokenini joylang
        const CHAT_ID = "YOUR_CHAT_ID";     // Chat yoki guruh ID'sini joylang

        let allProducts = [];
        let cart = [];

        async function loadProducts() {
            try {
                const t = new Date().getTime();
                const res = await fetch(`/data/products.json?v=${t}`);
                if (!res.ok) return renderEmpty();
                
                const fileNames = await res.json();
                const promises = fileNames.map(f => fetch(`/data/products/${f}?v=${t}`).then(r => r.json()).catch(() => null));
                
                allProducts = (await Promise.all(promises)).filter(p => p !== null);
                document.getElementById('count-all').textContent = allProducts.length;
                renderProducts(allProducts);
            } catch (e) {
                renderEmpty();
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            if (products.length === 0) return renderEmpty();

            grid.innerHTML = '';
            products.forEach(p => {
                const img = p.image 
                    ? `<img src="${p.image}" class="h-40 w-full object-cover rounded-xl mb-3">`
                    : `<div class="h-40 w-full bg-slate-900 rounded-xl mb-3 flex items-center justify-center text-slate-700"><i class="fas fa-box text-4xl"></i></div>`;

                grid.innerHTML += `
                    <div class="bg-slate-950 border border-slate-800 hover:border-slate-700 p-4 rounded-2xl flex flex-col justify-between transition group">
                        <div>
                            ${img}
                            <h4 class="font-bold text-slate-100 group-hover:text-aqua-400 transition text-sm mb-1">${p.title || 'Nomsiz'}</h4>
                            <p class="text-xs text-slate-500 line-clamp-2 mb-3">${p.body || ''}</p>
                        </div>
                        <div class="flex items-center justify-between border-t border-slate-900 pt-3">
                            <span class="font-extrabold text-aqua-400 text-sm">${Number(p.price || 0).toLocaleString()} so'm</span>
                            <button onclick="addToCart('${(p.title || '').replace(/'/g, "\\'")}', ${p.price || 0})" class="bg-slate-900 hover:bg-aqua-500 hover:text-slate-950 border border-slate-800 text-slate-200 p-2 rounded-lg text-xs font-bold transition">
                                <i class="fas fa-cart-plus"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function renderEmpty() {
            document.getElementById('products-grid').innerHTML = `<p class="col-span-full text-center py-12 text-slate-600">Mahsulotlar topilmadi.</p>`;
        }

        function addToCart(title, price) {
            const item = cart.find(c => c.title === title);
            if (item) item.qty++;
            else cart.push({ title, price, qty: 1 });
            updateCartUI();
            toggleCart(true);
        }

        function updateCartUI() {
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('cart-badge').textContent = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cart-total').textContent = `${total.toLocaleString()} so'm`;
            
            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between items-center p-3 bg-slate-900 rounded-xl border border-slate-800 text-xs">
                    <div>
                        <p class="font-bold text-white">${i.title}</p>
                        <p class="text-slate-500">${i.price.toLocaleString()} so'm</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeQty(${idx}, -1)" class="text-slate-400 hover:text-white px-1">-</button>
                        <span class="font-bold">${i.qty}</span>
                        <button onclick="changeQty(${idx}, 1)" class="text-slate-400 hover:text-white px-1">+</button>
                    </div>
                </div>
            `).join('');
        }

        function changeQty(idx, d) {
            cart[idx].qty += d;
            if (cart[idx].qty <= 0) cart.splice(idx, 1);
            updateCartUI();
        }

        function toggleCart(open) {
            const drawer = document.getElementById('cart-drawer');
            const panel = document.getElementById('cart-panel');
            if (open) {
                drawer.classList.remove('pointer-events-none', 'opacity-0');
                panel.classList.remove('translate-x-full');
            } else {
                drawer.classList.add('opacity-0');
                panel.classList.add('translate-x-full');
                setTimeout(() => drawer.classList.add('pointer-events-none'), 300);
            }
        }

        function filterProducts() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderProducts(allProducts.filter(p => (p.title || '').toLowerCase().includes(q)));
        }

        // BACKENDSIZ TELEGRAMGA YUBORISH
        async function checkout() {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const btn = document.getElementById('checkout-btn');

            if (!name || !phone) {
                alert("Iltimos, ismingiz va telefon raqamingizni kiriting!");
                return;
            }

            if (cart.length === 0) {
                alert("Savatcha bo'sh!");
                return;
            }

            // Tugmani yuklanish holatiga o'tkazish
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Yuborilmoqda...`;

            // Xabarni shakllantirish
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            let message = `🛒 *YANGI BUYURTMA (IDEAL AQUA)*\n\n`;
            message += `👤 *Mijoz:* ${name}\n`;
            message += `📞 *Tel:* ${phone}\n\n`;
            message += `📦 *Mahsulotlar:* \n`;

            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.title} — ${item.qty} ta x ${(item.price).toLocaleString()} = ${(item.price * item.qty).toLocaleString()} so'm\n`;
            });

            message += `\n💰 *Jami summasi:* ${total.toLocaleString()} so'm`;

            try {
                // Telegram API orqali orqa fonda yuborish
                const response = await fetch(`https://api.telegram.org/bot${8667051988:AAEcPNAYG2rEDp6IKyomGkVxE2Wmr8jeuok}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: 7782825299,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                if (response.ok) {
                    // Savatni tozalash
                    cart = [];
                    updateCartUI();
                    document.getElementById('cust-name').value = '';
                    document.getElementById('cust-phone').value = '';
                    
                    // Modal oynani ko'rsatish
                    toggleCart(false);
                    document.getElementById('success-modal').classList.remove('hidden');
                } else {
                    alert("Xatolik yuz berdi. Qayta urinib ko'ring yoki telefon orqali bog'laning.");
                }
            } catch (err) {
                alert("Tarmoq xatosi! Internet aloqasini tekshiring.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-check-circle"></i> Buyurtmani Tasdiqlash`;
            }
        }

        function closeSuccessModal() {
            document.getElementById('success-modal').classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
